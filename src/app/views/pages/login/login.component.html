<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
  <c-container breakpoint="md">
    <c-row class="justify-content-center">
      <c-col lg="10" xl="8">
        <c-card-group>
          <c-card class="p-4">
            <c-card-body>
              <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" cForm>
                <h1>Login</h1>
                <p class="text-body-secondary">Sign in to your account</p>

                <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
                  {{ errorMessage }}
                </div>

                <c-input-group class="mb-3">
                  <span cInputGroupText>
                    <svg cIcon name="cilUser"></svg>
                  </span>
                  <input
                    autoComplete="username"
                    cFormControl
                    formControlName="username"
                    placeholder="Email"
                    [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
                  />
                </c-input-group>
                <div class="invalid-feedback d-block mb-2" *ngIf="getFieldError('username')">
                  {{ getFieldError('username') }}
                </div>

                <c-input-group class="mb-4">
                  <span cInputGroupText>
                    <svg cIcon name="cilLockLocked"></svg>
                  </span>
                  <input
                    autoComplete="current-password"
                    cFormControl
                    formControlName="password"
                    placeholder="Password"
                    type="password"
                    [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                  />
                </c-input-group>
                <div class="invalid-feedback d-block mb-2" *ngIf="getFieldError('password')">
                  {{ getFieldError('password') }}
                </div>

                <c-row>
                  <c-col xs="6">
                    <button
                      cButton
                      class="px-4"
                      color="primary"
                      type="submit"
                      [disabled]="loading || loginForm.invalid"
                    >
                      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"></span>
                      {{ loading ? 'Logging in...' : 'Login' }}
                    </button>
                  </c-col>
                  <c-col class="text-end" xs="6">
                    <button cButton class="px-0" color="link" type="button">
                      Forgot password?
                    </button>
                  </c-col>
                </c-row>
              </form>
            </c-card-body>
          </c-card>

          <c-card [style.minWidth.%]="44" class="text-white bg-primary py-5">
            <c-card-body class="text-center">
              <div>
                <h2>Welcome</h2>
                <p>Welcome to the Smart Warehouse Management System. Manage your inventory, track items, and monitor stock efficiently from one place.</p>
                <button [active]="true" cButton class="mt-3" color="primary" routerLink="/login">
                  Get Started
                </button>
              </div>
            </c-card-body>
          </c-card>
        </c-card-group>
      </c-col>
    </c-row>
  </c-container>
</div>
