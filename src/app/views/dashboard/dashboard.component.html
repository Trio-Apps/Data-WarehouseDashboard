<div class="container-fluid h-100 d-flex flex-column p-0">
  <c-card class="flex-grow-1 d-flex flex-column m-0 full-height-card">
    <c-card-header class="custom-header">
      <div class="header-main">
        <div class="header-text">
          <h4 class="mb-1 header-title">Home</h4>
          <div class="header-meta">
            <span class="meta-item">
              <svg cIcon name="cilUser" class="me-2"></svg>
              {{ userDisplayName }}
            </span>
            <span class="meta-item">
              <svg cIcon name="cilFile" class="me-2"></svg>
              {{ connectedDatabase || 'No database selected' }}
            </span>
          </div>
          <div class="header-sub" *ngIf="lastSyncAt">
            Last sync: {{ lastSyncAt | date: 'medium' }}
          </div>
        </div>
        <div class="header-actions">
          <c-dropdown>
            <button cButton cDropdownToggle color="light" variant="outline" class="action-button" [caret]="false">
              <svg cIcon name="cilOptions" class="me-2"></svg>
              Actions
            </button>
            <ul cDropdownMenu class="actions-menu">
              <li>
                <button cDropdownItem (click)="onSyncData()" [disabled]="syncing">
                  <svg cIcon name="cilCloudDownload" class="me-2"></svg>
                  {{ syncing ? 'Syncing...' : 'Sync Data' }}
                </button>
              </li>
              <li><hr cDropdownDivider /></li>
              <li>
                <button cDropdownItem (click)="onLogout()">
                  <svg cIcon name="cilAccountLogout" class="me-2"></svg>
                  Logout
                </button>
              </li>
            </ul>
          </c-dropdown>
        </div>
      </div>
    </c-card-header>

    <c-card-body class="flex-grow-1 d-flex flex-column p-4">
      <c-row [gutter]="3" class="process-grid">
        <c-col [xs]="12" [md]="3" *ngFor="let module of visibleModuleTiles">
          <c-card
            class="process-card h-100"
            [class.disabled-card]="module.disabled"
            (click)="onModuleClick(module)"
          >
            <c-card-body class="text-center">
              <div class="icon-wrap" [ngClass]="module.iconClass">
                <svg cIcon [name]="module.icon" size="3xl" class="process-icon"></svg>
              </div>
              <h5 class="card-title">{{ module.title }}</h5>
              <p class="card-text">{{ module.description }}</p>
              <span class="badge bg-secondary" *ngIf="module.disabled">Coming soon</span>
            </c-card-body>
          </c-card>
        </c-col>
      </c-row>

      <div class="empty-state" *ngIf="visibleModuleTiles.length === 0">
        No modules available for your account.
      </div>
    </c-card-body>
  </c-card>
</div>
