<c-modal
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  size="lg"
  alignment="center">
  <c-modal-header>
    <h5 cModalTitle>Add Item to Purchase</h5>
  </c-modal-header>
  <c-modal-body>
    <mat-tab-group>
      <!-- Barcode Tab -->
      <mat-tab label="Add by Barcode">
        <div class="p-3">
          <form [formGroup]="barcodeForm" (ngSubmit)="onAddByBarcode()">
            <div class="row">
              <div class="col-md-12">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Barcode *</mat-label>
                  <input
                    matInput
                    formControlName="barCode"
                    placeholder="Enter barcode"
                    required>
                  <mat-hint>Scan or enter the item barcode</mat-hint>
                </mat-form-field>
              </div>
            </div>
            <div class="d-flex justify-content-end mt-3">
              <button
                cButton
                color="primary"
                type="submit"
                [disabled]="barcodeForm.invalid || saving">
                <span *ngIf="saving" class="spinner-border spinner-border-sm me-2" role="status"></span>
                Add Item
              </button>
            </div>
          </form>
        </div>
      </mat-tab>

      <!-- Manual Entry Tab -->
      <mat-tab label="Manual Entry">
        <div class="p-3">
          <form [formGroup]="manualForm" (ngSubmit)="onAddManually()">
            <div class="row g-3">
              <!-- Item Selection -->
              <div class="col-md-12">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Item *</mat-label>
                  <mat-select formControlName="itemId" required>
                    <mat-option *ngFor="let item of items" [value]="item.itemId">
                      {{ item.itemName }} ({{ item.itemCode }})
                    </mat-option>
                  </mat-select>
                </mat-form-field>
              </div>

              <!-- UoM Entry -->
              <div class="col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>UoM Entry *</mat-label>
                  <input
                    matInput
                    type="number"
                    formControlName="uoMEntry"
                    placeholder="-1"
                    required>
                  <mat-hint>Unit of Measure entry</mat-hint>
                </mat-form-field>
              </div>

              <!-- Quantity -->
              <div class="col-md-6">
                <mat-form-field appearance="outline" class="w-100">
                  <mat-label>Quantity *</mat-label>
                  <input
                    matInput
                    type="number"
                    step="0.01"
                    formControlName="quantity"
                    placeholder="1"
                    required>
                  <mat-hint>Quantity to purchase</mat-hint>
                </mat-form-field>
              </div>

             
            </div>
            <div class="d-flex justify-content-end mt-3">
              <button
                cButton
                color="primary"
                type="submit"
                [disabled]="manualForm.invalid || saving">
                <span *ngIf="saving" class="spinner-border spinner-border-sm me-2" role="status"></span>
                Add Item
              </button>
            </div>
          </form>
        </div>
      </mat-tab>
    </mat-tab-group>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="onClose()">
      Close
    </button>
  </c-modal-footer>
</c-modal>
