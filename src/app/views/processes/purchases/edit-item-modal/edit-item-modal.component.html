<c-modal
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  size="lg"
  alignment="center">
  <c-modal-header>
    <h5 cModalTitle>Edit Item</h5>
  </c-modal-header>
  <c-modal-body>
    <div class="p-3">
      <div class="mb-3" *ngIf="item">
        <strong>Item:</strong> {{ item.itemName }} ({{ item.itemCode }})
      </div>
      <form [formGroup]="editForm" (ngSubmit)="onUpdate()">
        <div class="row g-3">
          <!-- Purchase Order Item ID (Hidden) -->
          <input type="hidden" formControlName="purchaseOrderItemId">

          <!-- Quantity -->
          <div class="col-md-6">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Quantity *</mat-label>
              <input
                matInput
                type="number"
                step="0.01"
                formControlName="quantity"
                placeholder="0.01"
                required>
              <mat-hint>Quantity to purchase</mat-hint>
            </mat-form-field>
          </div>

          <!-- UoM Entry -->
          <div class="col-md-6">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>UoM Entry *</mat-label>
              <input
                matInput
                type="number"
                formControlName="uoMEntry"
                placeholder="0"
                required>
              <mat-hint>Unit of Measure entry</mat-hint>
            </mat-form-field>
          </div>
        </div>
        <div class="d-flex justify-content-end gap-2 mt-3">
          <button
            cButton
            color="secondary"
            type="button"
            (click)="onClose()"
            [disabled]="saving">
            Cancel
          </button>
          <button
            cButton
            color="primary"
            type="submit"
            [disabled]="editForm.invalid || saving">
            <span *ngIf="saving" class="spinner-border spinner-border-sm me-2" role="status"></span>
            Update Item
          </button>
        </div>
      </form>
    </div>
  </c-modal-body>
</c-modal>
