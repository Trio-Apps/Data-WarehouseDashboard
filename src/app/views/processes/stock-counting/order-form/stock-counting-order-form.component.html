<div class="container-fluid h-100 d-flex flex-column p-0">
  <c-card class="flex-grow-1 d-flex flex-column m-0">
    <c-card-header class="d-flex justify-content-between align-items-center">
      <h4 class="mb-0">{{ isEditMode() ? 'Edit Stock Counting Order' : 'New Stock Counting Order' }}</h4>
      <button cButton color="secondary" (click)="onBack()">
        <svg cIcon name="cil-arrow-left" class="me-2"></svg>
        Back
      </button>
    </c-card-header>

    <c-card-body class="p-4">
      @if (loading) {
        <div class="text-body-secondary">Loading...</div>
      } @else {
        <form class="row g-3" [formGroup]="form">
          <div class="col-md-4">
            <label class="form-label">Posting Date</label>
            <input cFormControl type="date" class="form-control" formControlName="postingDate" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Mode</label>
            <select cFormControl class="form-select" formControlName="mode">
              <option value="Counting">Counting</option>
              <option value="Posting">Posting</option>
            </select>
          </div>

          <div class="col-md-4 d-flex align-items-end">
            @if (!isEditMode()) {
              <div class="form-check">
                <input class="form-check-input" type="checkbox" formControlName="isDraft" id="isDraftCheck" />
                <label class="form-check-label" for="isDraftCheck">
                  Save as Draft
                </label>
              </div>
            }
          </div>

          <div class="col-12">
            <label class="form-label">Comment</label>
            <textarea cFormControl class="form-control" rows="3" formControlName="comment"></textarea>
          </div>

          <div class="col-12">
            <button cButton color="success" [disabled]="saving" (click)="onSave()">
              <svg cIcon name="cil-save" class="me-2"></svg>
              {{ isEditMode() ? 'Update' : 'Create' }}
            </button>
          </div>
        </form>
      }
    </c-card-body>
  </c-card>
</div>
