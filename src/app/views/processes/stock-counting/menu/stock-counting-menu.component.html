<div class="container-fluid h-100 d-flex flex-column p-0">
  <c-card class="flex-grow-1 d-flex flex-column m-0">
    <c-card-header class="d-flex justify-content-between align-items-center">
      <h4 class="mb-0">Stock Counting Menu</h4>
    </c-card-header>

    <c-card-body class="p-4">
      <div class="mb-3">
        <label class="form-label">Warehouse</label>
        <select cFormControl class="form-select" [formControl]="form.controls.warehouseId">
          <option [ngValue]="null">-- Select warehouse --</option>
          @for (warehouse of warehouses; track warehouse.warehouseId) {
            <option [ngValue]="warehouse.warehouseId">{{ warehouse.warehouseName }} (#{{ warehouse.warehouseId }})</option>
          }
        </select>
      </div>

      @if (loading) {
        <div class="text-body-secondary">Loading warehouses...</div>
      } @else {
        <div class="d-flex gap-2">
          <button cButton color="success" (click)="onCreateOrder()">
            <svg cIcon name="cil-plus" class="me-2"></svg>
            New Counting Order
          </button>

          <button cButton color="info" (click)="onViewOrders()">
            <svg cIcon name="cil-list-rich" class="me-2"></svg>
            View Orders
          </button>
        </div>
      }
    </c-card-body>
  </c-card>
</div>
