<div class="container-fluid h-100 d-flex flex-column p-0">
  <c-card class="flex-grow-1 d-flex flex-column m-0 full-height-card">
    <c-card-header class="custom-header d-flex justify-content-between align-items-center">
      <h4 class="mb-0 header-title">Production Menu</h4>
      <button cButton color="secondary" class="header-button" (click)="onBackToProcesses()">
        <svg cIcon name="cil-arrow-left" class="me-2"></svg>
        Back
      </button>
    </c-card-header>

    <c-card-body class="p-4">
      <div class="breadcrumb-bar mb-3">
        <span class="crumb">Dashboard</span>
        <span class="crumb-sep">›</span>
        <span class="crumb">Production</span>
        <span class="crumb-sep">›</span>
        <span class="crumb current">Menu</span>
      </div>

      <div class="warehouse-panel mb-4">
        <form [formGroup]="form">
          <label class="form-label">Warehouse</label>
          <select cFormControl class="form-select" formControlName="warehouseId">
            <option [ngValue]="null">-- Select warehouse --</option>
            @for (warehouse of warehouses; track warehouse.warehouseId) {
              <option [ngValue]="warehouse.warehouseId">{{ warehouse.warehouseName }} (#{{ warehouse.warehouseId }})</option>
            }
          </select>
        </form>
      </div>

      @if (loading) {
        <div class="text-center py-5 text-body-secondary">Loading warehouses...</div>
      } @else {
        <div class="list-head mb-3">
          <div class="list-title-wrap">
            <span class="list-icon"><svg cIcon name="cil-apps"></svg></span>
            <h5 class="list-title mb-0">Production Modules</h5>
          </div>
        </div>

        <c-row [gutter]="3">
          <c-col [xs]="12" [md]="6">
            <c-card class="option-card h-100" (click)="onCreateProduction()">
              <c-card-body class="text-center py-5">
                <div class="icon-wrap icon-emerald">
                  <svg cIcon name="cil-task" size="3xl"></svg>
                </div>
                <h5 class="mt-3 mb-2">Production Orders</h5>
                <p class="text-body-secondary mb-0">Create and execute a production cycle.</p>
              </c-card-body>
            </c-card>
          </c-col>

          <c-col [xs]="12" [md]="6">
            <c-card class="option-card h-100" (click)="onViewOrders()">
              <c-card-body class="text-center py-5">
                <div class="icon-wrap icon-blue">
                  <svg cIcon name="cil-list-rich" size="3xl"></svg>
                </div>
                <h5 class="mt-3 mb-2">View Production Orders</h5>
                <p class="text-body-secondary mb-0">Track status and open existing production orders.</p>
              </c-card-body>
            </c-card>
          </c-col>
        </c-row>
      }
    </c-card-body>
  </c-card>
</div>
