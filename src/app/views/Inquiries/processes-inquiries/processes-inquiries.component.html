<div class="container-fluid h-100 d-flex flex-column p-0">
  <c-card class="flex-grow-1 d-flex flex-column m-0 full-height-card">
    <c-card-header class="custom-header">
      <h4 class="mb-0 header-title">{{ 'inquiries.processes.title' | translate }}</h4>
    </c-card-header>

    <c-card-body class="flex-grow-1 d-flex flex-column p-0 card-body-container">
      <div class="form-section p-4">
        <form [formGroup]="form" (ngSubmit)="submit()">
          <c-row [gutter]="3" class="align-items-end">
            <c-col [md]="8">
              <label class="form-label">
                {{ 'inquiries.shared.enterWarehouseName' | translate }} <span class="text-danger">*</span>
              </label>

              <div class="position-relative">
                <input
                  cFormControl
                  type="text"
                  [placeholder]="'inquiries.shared.searchPlaceholder' | translate"
                  class="form-control"
                  [class.is-invalid]="form.controls['warehouseId'].invalid && form.controls['warehouseId'].touched"
                  [matAutocomplete]="auto"
                  (input)="onSearchChange($event)"
                  [value]="displayWarehouseName(form.value.warehouseId)"
                  autocomplete="off"
                />

                <mat-autocomplete
                  #auto="matAutocomplete"
                  (optionSelected)="onWarehouseSelected($event.option.value)"
                >
                  <mat-option
                    *ngFor="let warehouse of filteredOption"
                    [value]="warehouse.warehouseId"
                  >
                    {{ warehouse.warehouseName }}
                  </mat-option>
                </mat-autocomplete>
              </div>

              @if (form.controls['warehouseId'].invalid && form.controls['warehouseId'].touched) {
                <div class="invalid-feedback d-block">
                  {{ 'inquiries.shared.selectWarehouse' | translate }}
                </div>
              }
            </c-col>

            <c-col [md]="4">
              <button cButton color="primary" type="submit" class="w-100">
                {{ 'inquiries.shared.submit' | translate }}
              </button>
            </c-col>
          </c-row>
        </form>
      </div>
    </c-card-body>
  </c-card>
</div>
